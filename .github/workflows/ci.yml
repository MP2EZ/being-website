name: CI

on:
  pull_request:
    branches: [main, preview]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Lint + Tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout legal content from being repo
        uses: actions/checkout@v6
        with:
          repository: mp2ez/being
          ref: development
          token: ${{ secrets.GH_PACKAGES_TOKEN }}
          path: .tmp-being
          sparse-checkout: |
            docs/legal
          sparse-checkout-cone-mode: false

      - name: Copy legal files to content directory
        run: |
          mkdir -p content/legal
          cp -r .tmp-being/docs/legal/* content/legal/
          rm -rf .tmp-being

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Configure npm for GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_PACKAGES_TOKEN }}" >> .npmrc

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  wrangler-smoke:
    runs-on: ubuntu-latest
    name: Wrangler runtime smoke
    env:
      NOTION_TOKEN: test-token-not-used
      NOTION_WAITLIST_DB_ID: test-db-not-used
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout legal content from being repo
        uses: actions/checkout@v6
        with:
          repository: mp2ez/being
          ref: development
          token: ${{ secrets.GH_PACKAGES_TOKEN }}
          path: .tmp-being
          sparse-checkout: |
            docs/legal
          sparse-checkout-cone-mode: false

      - name: Copy legal files to content directory
        run: |
          mkdir -p content/legal
          cp -r .tmp-being/docs/legal/* content/legal/
          rm -rf .tmp-being

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Configure npm for GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_PACKAGES_TOKEN }}" >> .npmrc

      - name: Install dependencies
        run: npm ci

      - name: Build worker with OpenNext
        env:
          # Match the production build mode so the / → /home redirect path
          # and the rest of the (main) layout behavior is what gets smoked.
          NEXT_PUBLIC_SHOW_FULL_SITE: 'true'
        run: npx opennextjs-cloudflare build

      - name: Start wrangler dev in background
        run: |
          npx wrangler dev --port 8787 --local > wrangler.log 2>&1 &
          echo $! > wrangler.pid

      - name: Wait for worker readiness
        run: |
          # Probe /home (always 200) instead of / (now 307 under SHOW_FULL_SITE=true).
          for i in {1..30}; do
            if curl -sf -o /dev/null http://localhost:8787/home; then
              echo "Worker ready after ${i} attempt(s)"
              exit 0
            fi
            sleep 2
          done
          echo "Worker did not start; logs:"
          cat wrangler.log
          exit 1

      - name: Smoke test /api/waitlist
        run: |
          HTTP_CODE=$(curl -s -o /tmp/body -w "%{http_code}" \
            -X POST http://localhost:8787/api/waitlist \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Response body:"
          cat /tmp/body
          echo
          if [ "$HTTP_CODE" != "400" ]; then
            echo "Expected HTTP 400, got $HTTP_CODE"
            exit 1
          fi
          if ! grep -q "Valid email required" /tmp/body; then
            echo "Expected 'Valid email required' in response body"
            exit 1
          fi
          echo "Smoke test passed."

      - name: GET /crisis renders + security headers present
        run: |
          curl -s -i -o /tmp/crisis.txt http://localhost:8787/crisis
          echo "--- /crisis response headers ---"
          head -20 /tmp/crisis.txt
          if ! head -1 /tmp/crisis.txt | grep -q " 200 "; then
            echo "Expected HTTP 200 on /crisis"
            exit 1
          fi
          if ! grep -qi "988" /tmp/crisis.txt; then
            echo "Expected '988' in /crisis body"
            exit 1
          fi
          if ! grep -qi "strict-transport-security" /tmp/crisis.txt; then
            echo "Missing Strict-Transport-Security header"
            exit 1
          fi
          if ! grep -qi "content-security-policy" /tmp/crisis.txt; then
            echo "Missing Content-Security-Policy header"
            exit 1
          fi
          if ! grep -qi "x-frame-options: DENY" /tmp/crisis.txt; then
            echo "Missing X-Frame-Options: DENY header"
            exit 1
          fi
          echo "GET /crisis smoke + headers smoke passed."

      - name: GET / redirects to /home (production codepath)
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8787/)
          if [ "$HTTP_CODE" != "307" ] && [ "$HTTP_CODE" != "308" ]; then
            echo "Expected 307/308 redirect from /, got $HTTP_CODE"
            exit 1
          fi
          LOCATION=$(curl -sI http://localhost:8787/ | grep -i '^location:' | tr -d '\r' | awk '{print $2}')
          if [ "$LOCATION" != "/home" ]; then
            echo "Expected location: /home, got '$LOCATION'"
            exit 1
          fi
          echo "GET / redirect smoke passed."

      - name: GET /home renders
        run: |
          curl -s -i -o /tmp/home.txt http://localhost:8787/home
          if ! head -1 /tmp/home.txt | grep -q " 200 "; then
            echo "Expected HTTP 200 on /home"
            exit 1
          fi
          if ! grep -qi "Mindfulness with meaning" /tmp/home.txt; then
            echo "Expected 'Mindfulness with meaning' in /home body"
            exit 1
          fi
          echo "GET /home smoke passed."

      - name: GET /download renders pre-launch waitlist
        run: |
          curl -s -i -o /tmp/download.txt http://localhost:8787/download
          if ! head -1 /tmp/download.txt | grep -q " 200 "; then
            echo "Expected HTTP 200 on /download"
            exit 1
          fi
          if ! grep -qi "Coming soon" /tmp/download.txt; then
            echo "Expected 'Coming soon' in /download body (pre-launch waitlist marker)"
            exit 1
          fi
          if grep -qi "graphic needed" /tmp/download.txt; then
            echo "Found 'graphic needed' placeholder text — /download regressed to old badges"
            exit 1
          fi
          echo "GET /download smoke passed."

      - name: GET /privacy/multi-state renders
        run: |
          curl -s -i -o /tmp/multistate.txt http://localhost:8787/privacy/multi-state
          if ! head -1 /tmp/multistate.txt | grep -q " 200 "; then
            echo "Expected HTTP 200 on /privacy/multi-state"
            exit 1
          fi
          if ! grep -qi "Multi-State" /tmp/multistate.txt; then
            echo "Expected 'Multi-State' in /privacy/multi-state body"
            exit 1
          fi
          echo "GET /privacy/multi-state smoke passed."

      - name: Stop wrangler dev
        if: always()
        run: |
          if [ -f wrangler.pid ]; then
            kill "$(cat wrangler.pid)" 2>/dev/null || true
          fi
