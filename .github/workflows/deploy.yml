name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
      - preview
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Website

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout legal content from being repo
        uses: actions/checkout@v6
        with:
          repository: mp2ez/being
          ref: development
          token: ${{ secrets.GH_PACKAGES_TOKEN }}
          path: .tmp-being
          sparse-checkout: |
            docs/legal
          sparse-checkout-cone-mode: false

      - name: Copy legal files to content directory
        run: |
          mkdir -p content/legal
          cp -r .tmp-being/docs/legal/* content/legal/
          rm -rf .tmp-being

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure npm for GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_PACKAGES_TOKEN }}" >> .npmrc

      - name: Install dependencies
        run: npm ci

      - name: Build with OpenNext
        run: npx opennextjs-cloudflare build
        env:
          # Always serve the full site (both preview and main). The splash at /
          # is now unreachable in deployed envs — it stays in the codebase as
          # an emergency-fallback option but the runtime redirect carries
          # / → /home. /download serves as the pre-launch waitlist page.
          NEXT_PUBLIC_SHOW_FULL_SITE: 'true'

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy ${{ github.ref_name == 'preview' && '--env preview' || '' }}

      - name: Post-deploy smoke against live URL
        run: |
          URL="${{ github.ref_name == 'main' && 'https://being.fyi' || 'https://being-website-preview.palouselabs.workers.dev' }}"
          echo "Smoke testing $URL ..."
          # Brief wait for Cloudflare edge propagation after deploy
          sleep 15
          # Cache-bust query param to avoid stale edge responses
          CB="?cb=$(date +%s)"
          # /home must return 200
          HOME_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL/home$CB")
          if [ "$HOME_CODE" != "200" ]; then
            echo "FAIL: $URL/home returned $HOME_CODE (expected 200)"
            exit 1
          fi
          # /download must contain pre-launch marker (update at app launch)
          if ! curl -sf "$URL/download$CB" | grep -q "Coming soon"; then
            echo "FAIL: $URL/download body missing 'Coming soon' marker"
            exit 1
          fi
          # /privacy must serve security headers (HSTS proves the security
          # headers pipeline is intact end-to-end through Cloudflare)
          if ! curl -sI "$URL/privacy" | grep -qi "strict-transport-security"; then
            echo "FAIL: $URL/privacy missing Strict-Transport-Security header"
            exit 1
          fi
          echo "Post-deploy smoke passed for $URL"
